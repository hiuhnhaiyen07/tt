<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Weather Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="weatherCanvas"></canvas>

<div class="app">

<div class="search">
<input id="cityInput" placeholder="Nhập thành phố...">
<button id="searchBtn">Tìm</button>
</div>

<div class="quick" id="savedCities"></div>

<div class="card">
<h2 id="city">--</h2>
<div class="temp" id="temp">--°</div>
<p id="desc"></p>

<div class="grid">
<div>💧 <span id="humidity"></span>%</div>
<div>🌬 <span id="wind"></span> km/h</div>
<div>👁 <span id="visibility"></span> km</div>
<div>☁ <span id="clouds"></span>%</div>
</div>
</div>

<h3>5 ngày tới</h3>
<div id="forecast" class="forecast"></div>

</div>

<script src="app.js"></script>

</body>
</html>
